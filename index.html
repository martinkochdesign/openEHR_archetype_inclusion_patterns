<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"
            integrity="sha512-LnvoEWDFrqGHlHmDD2101OrLcbsfkrzoSpvtSQtxK3RMnRV0eOkhhBN2dXHKRrUU8p2DGRTk35n4O8nWSVe1mQ=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css"
          integrity="sha512-WgxfT5LWjfszlPHXRmBWHkV2eceiWTOBvrKCNbdgDYTHrT2AeLCGbF4sZlZw3UMN3WtL0tGUoIAKsu8mllg/XA=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface-hover: #24243a;
            --border: rgba(255,255,255,0.06);
            --text: #e4e4ed;
            --text-muted: #8888a4;
            --accent: #6c63ff;
            --accent-glow: rgba(108,99,255,0.35);
            --accent2: #00d4aa;
            --accent2-glow: rgba(0,212,170,0.25);
            --danger: #ff6b8a;
            --highlight: #f5a623;
            --highlight-glow: rgba(245,166,35,0.4);
            --dimmed: rgba(100,100,130,0.25);
            --sidebar-w: 320px;
            --infopanel-w: 360px;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ── LEFT SIDEBAR ── */
        #sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: transform .3s cubic-bezier(.4,0,.2,1);
        }
        #sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); min-width: 0; width: 0; }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h2 {
            font-size: 13px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--accent); margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-header h2 .material-icons-round { font-size: 18px; }

        .search-wrapper { position: relative; }
        .search-wrapper .material-icons-round {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            font-size: 18px; color: var(--text-muted); pointer-events: none; transition: color .2s;
        }
        #nodeSearch {
            width: 100%; padding: 10px 14px 10px 42px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 10px; color: var(--text);
            font-size: 13px; font-family: inherit; outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        #nodeSearch::placeholder { color: var(--text-muted); }
        #nodeSearch:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        #nodeSearch:focus + .material-icons-round { color: var(--accent); }

        .node-count { font-size: 11px; color: var(--text-muted); padding: 10px 20px 6px; font-weight: 500; }

        #nodeList {
            flex: 1; overflow-y: auto; padding: 4px 12px 20px;
            scrollbar-width: thin; scrollbar-color: rgba(108,99,255,0.3) transparent;
        }
        #nodeList::-webkit-scrollbar { width: 5px; }
        #nodeList::-webkit-scrollbar-track { background: transparent; }
        #nodeList::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.3); border-radius: 10px; }

        .node-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 14px;
            margin-bottom: 2px; border-radius: 10px; cursor: pointer;
            transition: all .15s ease; border: 1px solid transparent;
        }
        .node-item:hover { background: var(--surface-hover); border-color: var(--border); }
        .node-item.active {
            background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(0,212,170,0.08));
            border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow);
        }
        .node-item.template-match {
            background: linear-gradient(135deg, rgba(245,166,35,0.12), rgba(245,166,35,0.04));
            border-color: rgba(245,166,35,0.3);
        }
        .node-item.template-dimmed { opacity: 0.35; }

        .node-dot {
            width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow); flex-shrink: 0; transition: all .2s;
        }
        .node-item:hover .node-dot { transform: scale(1.4); }
        .node-item.active .node-dot { background: var(--accent2); box-shadow: 0 0 10px var(--accent2-glow); }
        .node-item.template-match .node-dot { background: var(--highlight); box-shadow: 0 0 10px var(--highlight-glow); }

        .node-label {
            font-size: 12.5px;
            font-weight: 400;
            color: var(--text);
            word-break: break-all;
            overflow-wrap: break-word;
            white-space: normal;
            line-height: 1.4;
        }

        .node-item.active .node-label { font-weight: 600; color: #fff; }
        .no-results { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
        .no-results .material-icons-round { font-size: 36px; margin-bottom: 10px; display: block; opacity: .4; }

        /* ── MAIN AREA ── */
        #main {
            flex: 1; display: flex; flex-direction: column;
            position: relative; min-width: 0;
        }

        #toolbar {
            display: flex; align-items: center; gap: 8px; padding: 12px 20px;
            background: var(--surface); border-bottom: 1px solid var(--border);
        }
        .tool-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 10px;
            background: var(--bg); color: var(--text-muted); cursor: pointer;
            transition: all .15s; font-size: 20px;
        }
        .tool-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(108,99,255,0.08); }
        .tool-btn.active-toggle { color: var(--accent2); border-color: var(--accent2); background: rgba(0,212,170,0.08); }

        #selected-info {
            margin-left: auto; font-size: 12px; color: var(--text-muted);
            max-width: 50%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ── TEMPLATE FILTER BAR ── */
        #templateBar {
            display: flex; align-items: center; gap: 10px; padding: 10px 20px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #templateBar .bar-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: var(--highlight); white-space: nowrap;
            display: flex; align-items: center; gap: 6px;
        }
        #templateBar .bar-label .material-icons-round { font-size: 16px; }

        .template-search-wrapper {
            position: relative; flex: 1; max-width: 400px;
        }
        .template-search-wrapper .material-icons-round {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            font-size: 16px; color: var(--text-muted); pointer-events: none; transition: color .2s;
        }
        #templateSearch {
            width: 100%; padding: 8px 12px 8px 36px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 12px; font-family: inherit; outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        #templateSearch::placeholder { color: var(--text-muted); }
        #templateSearch:focus { border-color: var(--highlight); box-shadow: 0 0 0 3px var(--highlight-glow); }
        #templateSearch:focus + .material-icons-round { color: var(--highlight); }

        #templateDropdown {
            position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; max-height: 240px; overflow-y: auto;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6); z-index: 50; display: none;
            scrollbar-width: thin; scrollbar-color: rgba(245,166,35,0.3) transparent;
        }
        #templateDropdown::-webkit-scrollbar { width: 5px; }
        #templateDropdown::-webkit-scrollbar-thumb { background: rgba(245,166,35,0.3); border-radius: 10px; }
        #templateDropdown.visible { display: block; }

        .template-option {
            padding: 8px 14px; font-size: 12px; cursor: pointer;
            transition: background .1s; display: flex; align-items: center; gap: 8px;
        }
        .template-option:hover { background: var(--surface-hover); }
        .template-option.selected { background: rgba(245,166,35,0.1); color: var(--highlight); font-weight: 600; }
        .template-option .count {
            margin-left: auto; font-size: 10px; color: var(--text-muted);
            background: var(--bg); padding: 2px 7px; border-radius: 6px; font-weight: 500;
        }

        #activeTemplate {
            display: none; align-items: center; gap: 6px;
            background: linear-gradient(135deg, rgba(245,166,35,0.15), rgba(245,166,35,0.06));
            border: 1px solid rgba(245,166,35,0.3); border-radius: 8px;
            padding: 5px 10px; font-size: 11px; font-weight: 500; color: var(--highlight);
            white-space: nowrap; max-width: 300px;
        }
        #activeTemplate.visible { display: inline-flex; }
        #activeTemplateText { overflow: hidden; text-overflow: ellipsis; }
        #activeTemplate .clear-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 18px; height: 18px; border: none; border-radius: 50%;
            background: rgba(245,166,35,0.2); color: var(--highlight); cursor: pointer;
            font-size: 14px; transition: all .15s; flex-shrink: 0; padding: 0;
        }
        #activeTemplate .clear-btn:hover { background: var(--highlight); color: var(--bg); }

        #templateMatchCount {
            font-size: 11px; color: var(--text-muted); white-space: nowrap; font-weight: 500;
        }

        #mynetwork {
            flex: 1;
            background:
                radial-gradient(circle at 20% 30%, rgba(108,99,255,0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,212,170,0.04) 0%, transparent 50%),
                var(--bg);
            background-size: cover;
        }

        /* ── LOADING OVERLAY ── */
        #loadingBar {
            position: absolute; inset: 0; background: rgba(15,15,19,0.92);
            backdrop-filter: blur(12px); display: flex; align-items: center;
            justify-content: center; z-index: 100; transition: opacity .5s ease;
        }
        .loader-content { text-align: center; }
        .loader-content .label {
            font-size: 13px; color: var(--text-muted); margin-bottom: 16px;
            letter-spacing: 1px; text-transform: uppercase; font-weight: 500;
        }
        .progress-track {
            width: 320px; height: 6px; background: rgba(255,255,255,0.06);
            border-radius: 10px; overflow: hidden; margin-bottom: 10px;
        }
        #bar {
            height: 100%; width: 0; border-radius: 10px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            box-shadow: 0 0 16px var(--accent-glow); transition: width .3s ease;
        }
        #text { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

        .vis-tooltip {
            background: var(--surface) !important; color: var(--text) !important;
            border: 1px solid var(--border) !important; border-radius: 8px !important;
            padding: 8px 12px !important; font-family: 'Inter', sans-serif !important;
            font-size: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
        }

        /* ── RIGHT INFO PANEL ── */
        #infopanel {
            width: 0; min-width: 0; height: 100vh; background: var(--surface);
            border-left: 1px solid var(--border); display: flex; flex-direction: column;
            z-index: 10; overflow: hidden;
            transition: width .35s cubic-bezier(.4,0,.2,1), min-width .35s cubic-bezier(.4,0,.2,1);
        }
        #infopanel.open { width: var(--infopanel-w); min-width: var(--infopanel-w); }

        .infopanel-node-id { padding: 14px 20px 0; flex-shrink: 0; }
        .infopanel-node-id .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(0,212,170,0.08));
            border: 1px solid rgba(108,99,255,0.2); border-radius: 8px;
            padding: 6px 12px; font-size: 11px; font-weight: 500;
            color: var(--accent); word-break: break-all; max-width: 100%;
        }
        .infopanel-node-id .badge .material-icons-round { font-size: 14px; color: var(--accent2); flex-shrink: 0; }

        .infopanel-divider { height: 1px; background: var(--border); margin: 14px 20px; flex-shrink: 0; }

        #infopanelContent {
            flex: 1; overflow-y: auto; padding: 0 20px 24px; font-size: 13px;
            line-height: 1.7; color: var(--text);
            scrollbar-width: thin; scrollbar-color: rgba(0,212,170,0.3) transparent;
        }
        #infopanelContent::-webkit-scrollbar { width: 5px; }
        #infopanelContent::-webkit-scrollbar-track { background: transparent; }
        #infopanelContent::-webkit-scrollbar-thumb { background: rgba(0,212,170,0.3); border-radius: 10px; }

        #infopanelContent h1, #infopanelContent h2, #infopanelContent h3,
        #infopanelContent h4, #infopanelContent h5, #infopanelContent h6 {
            color: #fff; margin: 16px 0 8px; font-weight: 600;
        }
        #infopanelContent h1 { font-size: 18px; }
        #infopanelContent h2 { font-size: 16px; }
        #infopanelContent h3 { font-size: 14px; }
        #infopanelContent p { margin-bottom: 10px; }
        #infopanelContent a { color: var(--accent2); text-decoration: none; }
        #infopanelContent a:hover { text-decoration: underline; }
        #infopanelContent ul, #infopanelContent ol { padding-left: 20px; margin-bottom: 10px; }
        #infopanelContent li { margin-bottom: 4px; }
        #infopanelContent code {
            background: rgba(108,99,255,0.12); color: var(--accent);
            padding: 2px 6px; border-radius: 4px; font-size: 12px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }
        #infopanelContent pre {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px; overflow-x: auto; margin-bottom: 12px;
        }
        #infopanelContent pre code { background: none; padding: 0; }
        #infopanelContent table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12px; }
        #infopanelContent th {
            text-align: left; padding: 8px 10px; background: var(--bg);
            border: 1px solid var(--border); color: var(--accent2); font-weight: 600;
        }
        #infopanelContent td { padding: 6px 10px; border: 1px solid var(--border); }
        #infopanelContent strong { color: #fff; }
        #infopanelContent em { color: var(--accent2); font-style: italic; }
        #infopanelContent hr { border: none; height: 1px; background: var(--border); margin: 14px 0; }
        #infopanelContent blockquote {
            border-left: 3px solid var(--accent); padding: 8px 14px; margin: 10px 0;
            background: rgba(108,99,255,0.06); border-radius: 0 8px 8px 0; color: var(--text-muted);
        }

        .infopanel-empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
        .infopanel-empty .material-icons-round { font-size: 40px; margin-bottom: 12px; display: block; opacity: .3; }

        /* ── Collapsible sections in info panel ── */
        .collapsible-section {
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
            background: rgba(255,255,255,0.01);
        }

        .collapsible-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.02);
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: background .15s;
            text-align: left;
        }

        .collapsible-toggle:hover {
            background: var(--surface-hover);
        }

        .collapsible-toggle .toggle-icon {
            font-size: 18px;
            color: var(--text-muted);
            transition: transform .25s cubic-bezier(.4,0,.2,1);
        }

        .collapsible-section.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .collapsible-content {
            padding: 4px 14px 14px;
            max-height: 2000px;
            overflow: hidden;
            transition: max-height .35s cubic-bezier(.4,0,.2,1),
                        padding .35s cubic-bezier(.4,0,.2,1),
                        opacity .25s ease;
            opacity: 1;
        }

        .collapsible-section.collapsed .collapsible-content {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
        }

        /* ── LIGHT THEME ── */
        body.light {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --surface-hover: #f0f1f4;
            --border: rgba(0,0,0,0.08);
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --accent: #5b52e0;
            --accent-glow: rgba(91,82,224,0.2);
            --accent2: #00a884;
            --accent2-glow: rgba(0,168,132,0.15);
            --danger: #e5484d;
            --highlight: #d97706;
            --highlight-glow: rgba(217,119,6,0.2);
            --dimmed: rgba(100,100,130,0.25);
        }

        body.light #mynetwork {
            background:
                radial-gradient(circle at 20% 30%, rgba(91,82,224,0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,168,132,0.03) 0%, transparent 50%),
                var(--bg);
        }

        body.light .tool-btn { background: var(--surface); }
        body.light #nodeSearch,
        body.light #templateSearch { background: var(--bg); }
        body.light .node-label { color: var(--text); }
        body.light .node-item.active .node-label { color: var(--text); }

        body.light .collapsible-toggle {
            background: rgba(0,0,0,0.02);
            color: var(--text);
        }
        body.light .collapsible-toggle:hover { background: var(--surface-hover); }
        body.light .collapsible-section {
            border-color: var(--border);
            background: rgba(0,0,0,0.01);
        }

        body.light #loadingBar { background: rgba(244,245,247,0.92); }

        body.light .vis-tooltip {
            background: var(--surface) !important; color: var(--text) !important;
            border: 1px solid var(--border) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12) !important;
        }

        body.light .infopanel-node-id .badge {
            background: linear-gradient(135deg, rgba(91,82,224,0.08), rgba(0,168,132,0.05));
            border-color: rgba(91,82,224,0.15); color: var(--accent);
        }

        body.light #infopanelContent strong { color: var(--text); }
        body.light #infopanelContent h1,
        body.light #infopanelContent h2,
        body.light #infopanelContent h3,
        body.light #infopanelContent h4,
        body.light #infopanelContent h5,
        body.light #infopanelContent h6 { color: var(--text); }

        body.light #infopanelContent code {
            background: rgba(91,82,224,0.08); color: var(--accent);
        }
        body.light #infopanelContent pre {
            background: var(--bg); border-color: var(--border);
        }
        body.light #infopanelContent th {
            background: var(--bg); color: var(--accent2); border-color: var(--border);
        }
        body.light #infopanelContent td { border-color: var(--border); }
        body.light #infopanelContent blockquote {
            background: rgba(91,82,224,0.04); border-left-color: var(--accent); color: var(--text-muted);
        }

        body.light .template-option:hover { background: var(--surface-hover); }
        body.light #templateDropdown {
            background: var(--surface); border-color: var(--border);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
        }
        body.light .template-option .count { background: var(--bg); }
        body.light #activeTemplate {
            background: linear-gradient(135deg, rgba(217,119,6,0.1), rgba(217,119,6,0.04));
            border-color: rgba(217,119,6,0.25);
        }
        body.light .node-item.active {
            background: linear-gradient(135deg, rgba(91,82,224,0.1), rgba(0,168,132,0.06));
            border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow);
        }
        body.light .node-item.template-match {
            background: linear-gradient(135deg, rgba(217,119,6,0.08), rgba(217,119,6,0.03));
            border-color: rgba(217,119,6,0.2);
        }
    </style>
</head>

<body>

<!-- LEFT SIDEBAR -->
<div id="sidebar">
    <div class="sidebar-header">
        <h2><span class="material-icons-round">hub</span> Archetype Inclusion Patterns</h2>
        <div class="search-wrapper">
            <input type="text" id="nodeSearch" placeholder="Search archetypes…" autocomplete="off" spellcheck="false">
            <span class="material-icons-round">search</span>
        </div>
    </div>
    <div class="node-count" id="nodeCount"></div>
    <div id="nodeList"></div>
</div>

<!-- MAIN -->
<div id="main">
    <div id="toolbar">
        <button class="tool-btn" id="toggleSidebar" title="Toggle sidebar"><span class="material-icons-round">menu</span></button>
        <button class="tool-btn" id="btnFit" title="Fit all"><span class="material-icons-round">fit_screen</span></button>
        <button class="tool-btn" id="btnZoomIn" title="Zoom in"><span class="material-icons-round">add</span></button>
        <button class="tool-btn" id="btnZoomOut" title="Zoom out"><span class="material-icons-round">remove</span></button>
        <button class="tool-btn" id="btnPhysics" title="Pause physics"><span class="material-icons-round">pause</span></button>
        <button class="tool-btn" id="btnInfoPanel" title="Toggle info panel"><span class="material-icons-round">info</span></button>
        <button class="tool-btn" id="btnDownload" title="Download raw data file"><span class="material-icons-round">download</span></button>
        <button class="tool-btn" id="btnTheme" title="Switch to light theme"><span class="material-icons-round">light_mode</span></button>
        <span id="selected-info"></span>
    </div>

    <!-- TEMPLATE FILTER BAR -->
    <div id="templateBar">
        <span class="bar-label"><span class="material-icons-round">filter_alt</span> Template</span>
        <div class="template-search-wrapper">
            <input type="text" id="templateSearch" placeholder="Search templates…" autocomplete="off" spellcheck="false">
            <span class="material-icons-round">search</span>
            <div id="templateDropdown"></div>
        </div>
        <div id="activeTemplate">
            <span id="activeTemplateText"></span>
            <button class="clear-btn" id="clearTemplate" title="Clear filter"><span class="material-icons-round">close</span></button>
        </div>
        <span id="templateMatchCount"></span>
    </div>

    <div id="mynetwork"></div>
    <div id="loadingBar">
        <div class="loader-content">
            <div class="label">Stabilizing layout…</div>
            <div class="progress-track"><div id="bar"></div></div>
            <div id="text">0 %</div>
        </div>
    </div>
</div>

<!-- RIGHT INFO PANEL -->
<div id="infopanel">
    <div class="infopanel-node-id" id="infopanelNodeId" style="display:none;">
        <div class="badge"><span class="material-icons-round">tag</span> <span id="infopanelNodeIdText"></span></div>
    </div>
    <div class="infopanel-divider" id="infopanelDivider" style="display:none;"></div>
    <div id="infopanelContent">
        <div class="infopanel-empty">
            <span class="material-icons-round">touch_app</span>
            Select a node to view its details.
        </div>
    </div>
</div>

<script src="dataset.js"></script>
<script>
    // ── NETWORK ──
    var container = document.getElementById('mynetwork');
    var data = { nodes: nodes, edges: edges };
    var options = {
        configure: {
            enabled: false
        },
        edges: {
            smooth: {
                enabled: true,
                type: "continuous"
            }
        },
        interaction: {
            dragNodes: true,
            hover: true,
            tooltipDelay: 150,
            zoomView: true,
            dragView: true
        },
        physics: {
            enabled: true,
            solver: "forceAtlas2Based",
            forceAtlas2Based: {
                gravitationalConstant: -160,
                centralGravity: 0.004,
                springLength: 400,
                springConstant: 0.05,
                avoidOverlap: 0.7
            },
            stabilization: {
                enabled: true,
                iterations: 400,
                updateInterval: 50,
                fit: true
            }
        }
    };



    var network = new vis.Network(container, data, options);

    // ── Store original node colors for reset ──
    var originalColors = {};
    nodes.get().forEach(function(n) {
        originalColors[n.id] = { color: n.color, font: n.font };
    });

    // ── LOADING BAR ──
    network.on("stabilizationProgress", function(p) {
        var pct = Math.round((p.iterations / p.total) * 100);
        document.getElementById('bar').style.width = pct + '%';
        document.getElementById('text').innerHTML = pct + ' %';
    });
    network.once("stabilizationIterationsDone", function() {
        document.getElementById('bar').style.width = '100%';
        document.getElementById('text').innerHTML = '100 %';
        var lb = document.getElementById('loadingBar');
        lb.style.opacity = 0;
        setTimeout(function() { lb.style.display = 'none'; }, 500);
    });

    // ── TEMPLATE FILTER ──
    var activeTemplateName = null;

    function getAllTemplates() {
        var templateMap = {};
        nodes.get().forEach(function(n) {
            if (n.templates && Array.isArray(n.templates)) {
                n.templates.forEach(function(t) {
                    if (!templateMap[t]) templateMap[t] = 0;
                    templateMap[t]++;
                });
            }
        });
        var sorted = Object.keys(templateMap).sort(function(a, b) { return a.localeCompare(b); });
        return sorted.map(function(name) { return { name: name, count: templateMap[name] }; });
    }

    var allTemplates = getAllTemplates();

    function buildTemplateDropdown(filter) {
        var dropdown = document.getElementById('templateDropdown');
        var filtered = allTemplates;
        if (filter) {
            var q = filter.toLowerCase();
            filtered = allTemplates.filter(function(t) { return t.name.toLowerCase().indexOf(q) !== -1; });
        }
        if (filtered.length === 0) {
            dropdown.innerHTML = '<div style="padding:12px 14px; font-size:12px; color:var(--text-muted); text-align:center;">No templates found.</div>';
        } else {
            var html = '';
            filtered.forEach(function(t) {
                var sel = t.name === activeTemplateName ? ' selected' : '';
                html += '<div class="template-option' + sel + '" data-template="' + t.name + '">'
                      + '<span>' + highlightMatch(t.name, filter) + '</span>'
                      + '<span class="count">' + t.count + '</span>'
                      + '</div>';
            });
            dropdown.innerHTML = html;
        }
        dropdown.querySelectorAll('.template-option').forEach(function(el) {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                var name = this.getAttribute('data-template');
                selectTemplate(name);
                hideTemplateDropdown();
                document.getElementById('templateSearch').value = '';
            });
        });
    }

    function showTemplateDropdown() {
        var dropdown = document.getElementById('templateDropdown');
        buildTemplateDropdown(document.getElementById('templateSearch').value);
        dropdown.classList.add('visible');
    }

    function hideTemplateDropdown() {
        document.getElementById('templateDropdown').classList.remove('visible');
    }

    document.getElementById('templateSearch').addEventListener('focus', showTemplateDropdown);
    document.getElementById('templateSearch').addEventListener('input', function() {
        buildTemplateDropdown(this.value);
        showTemplateDropdown();
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.template-search-wrapper')) {
            hideTemplateDropdown();
        }
    });

    function selectTemplate(name) {
        activeTemplateName = name;
        document.getElementById('activeTemplateText').textContent = name;
        document.getElementById('activeTemplate').classList.add('visible');

        var isLight = document.body.classList.contains('light');
        var matchCount = 0;
        var updates = [];
        nodes.get().forEach(function(n) {
            var hasTemplate = n.templates && Array.isArray(n.templates) && n.templates.indexOf(name) !== -1;
            if (hasTemplate) {
                matchCount++;
                updates.push({
                    id: n.id,
                    color: {
                        background: isLight ? '#d97706' : '#f5a623',
                        border: isLight ? '#e69a1e' : '#ffc857',
                        highlight: { background: isLight ? '#e6a830' : '#ffd470', border: isLight ? '#f0c050' : '#ffe0a0' },
                        hover: { background: isLight ? '#e69a1e' : '#ffc857', border: isLight ? '#f0b840' : '#ffd470' }
                    },
                    font: { color: isLight ? '#1a1a2e' : '#fff', size: 13 }
                });
            } else {
                updates.push({
                    id: n.id,
                    color: {
                        background: isLight ? 'rgba(0,0,0,0.06)' : 'rgba(100,100,130,0.15)',
                        border: isLight ? 'rgba(0,0,0,0.08)' : 'rgba(100,100,130,0.2)',
                        highlight: { background: isLight ? 'rgba(0,0,0,0.1)' : 'rgba(100,100,130,0.25)', border: isLight ? 'rgba(0,0,0,0.12)' : 'rgba(100,100,130,0.3)' },
                        hover: { background: isLight ? 'rgba(0,0,0,0.08)' : 'rgba(100,100,130,0.2)', border: isLight ? 'rgba(0,0,0,0.1)' : 'rgba(100,100,130,0.25)' }
                    },
                    font: { color: isLight ? 'rgba(0,0,0,0.2)' : 'rgba(200,200,220,0.25)', size: 12 }
                });
            }
        });
        nodes.update(updates);

        var matchedIds = new Set(nodes.get().filter(function(n) {
            return n.templates && n.templates.indexOf(name) !== -1;
        }).map(function(n) { return n.id; }));

        var edgeUpdates = [];
        edges.get().forEach(function(e) {
            if (matchedIds.has(e.from) && matchedIds.has(e.to)) {
                edgeUpdates.push({ id: e.id, color: { color: isLight ? 'rgba(217,119,6,0.45)' : 'rgba(245,166,35,0.5)', highlight: isLight ? '#e69a1e' : '#ffc857', hover: isLight ? 'rgba(217,119,6,0.65)' : 'rgba(245,166,35,0.7)' }});
            } else {
                edgeUpdates.push({ id: e.id, color: { color: isLight ? 'rgba(0,0,0,0.06)' : 'rgba(100,100,130,0.1)', highlight: isLight ? 'rgba(0,0,0,0.1)' : 'rgba(100,100,130,0.2)', hover: isLight ? 'rgba(0,0,0,0.08)' : 'rgba(100,100,130,0.15)' }});
            }
        });
        edges.update(edgeUpdates);

        document.getElementById('templateMatchCount').textContent = matchCount + ' node' + (matchCount !== 1 ? 's' : '') + ' matched';
        buildList(document.getElementById('nodeSearch').value);
    }

    function clearTemplateFilter() {
        activeTemplateName = null;
        document.getElementById('activeTemplate').classList.remove('visible');
        document.getElementById('templateMatchCount').textContent = '';
        document.getElementById('templateSearch').value = '';

        var isLight = document.body.classList.contains('light');

        // Restore original node colors (theme-aware)
        var updates = [];
        nodes.get().forEach(function(n) {
            updates.push({
                id: n.id,
                color: {
                    background: isLight ? '#5b52e0' : '#6c63ff',
                    border: isLight ? '#7a72f0' : '#8a83ff',
                    highlight: { background: isLight ? '#00a884' : '#00d4aa', border: isLight ? '#00c49a' : '#00f0c0' },
                    hover: { background: isLight ? '#7a72f0' : '#8a83ff', border: isLight ? '#9a92ff' : '#a09aff' }
                },
                font: { color: isLight ? '#1a1a2e' : '#cccce0', size: 12 }
            });
        });
        nodes.update(updates);

        // Update stored original colors
        nodes.get().forEach(function(n) {
            originalColors[n.id] = { color: n.color, font: n.font };
        });

        // Restore edge colors (theme-aware)
        var edgeUpdates = [];
        edges.get().forEach(function(e) {
            edgeUpdates.push({
                id: e.id,
                color: {
                    color: isLight ? 'rgba(91,82,224,0.35)' : 'rgba(108,99,255,0.45)',
                    highlight: isLight ? '#00a884' : '#00d4aa',
                    hover: isLight ? 'rgba(91,82,224,0.6)' : 'rgba(108,99,255,0.7)'
                }
            });
        });
        edges.update(edgeUpdates);

        buildList(document.getElementById('nodeSearch').value);
    }
    
    document.getElementById('clearTemplate').addEventListener('click', clearTemplateFilter);

    // ── SIDEBAR LIST ──
    var activeNodeId = null;

    function buildList(filter) {
        var list = document.getElementById('nodeList');
        var allNodes = nodes.get();
        var filtered = allNodes;
        if (filter) {
            var q = filter.toLowerCase();
            filtered = allNodes.filter(function(n) { return n.label.toLowerCase().indexOf(q) !== -1; });
        }
        document.getElementById('nodeCount').textContent = filtered.length + ' of ' + allNodes.length + ' nodes';
        if (filtered.length === 0) {
            list.innerHTML = '<div class="no-results"><span class="material-icons-round">search_off</span>No nodes match your search.</div>';
            return;
        }
        filtered.sort(function(a, b) { return a.label.localeCompare(b.label); });
        var html = '';
        filtered.forEach(function(n) {
            var classes = 'node-item';
            if (n.id === activeNodeId) classes += ' active';
            if (activeTemplateName) {
                var match = n.templates && Array.isArray(n.templates) && n.templates.indexOf(activeTemplateName) !== -1;
                classes += match ? ' template-match' : ' template-dimmed';
            }
            html += '<div class="' + classes + '" data-id="' + n.id + '">'
                  + '<span class="node-dot"></span>'
                  + '<span class="node-label" title="' + n.label + '">' + highlightMatch(n.label, filter) + '</span>'
                  + '</div>';
        });
        list.innerHTML = html;
        list.querySelectorAll('.node-item').forEach(function(el) {
            el.addEventListener('click', function() { focusNode(this.getAttribute('data-id')); });
        });
    }

    function highlightMatch(text, query) {
        if (!query) return text;
        var idx = text.toLowerCase().indexOf(query.toLowerCase());
        if (idx === -1) return text;
        return text.substring(0, idx) + '<strong style="color:#00d4aa">' + text.substring(idx, idx + query.length) + '</strong>' + text.substring(idx + query.length);
    }

    // ── INFO PANEL ──
    var infoPanelManuallyHidden = false;

    function showInfoPanel(nodeId) {
        var node = nodes.get(nodeId);
        if (!node) return;
        var panel = document.getElementById('infopanel');
        var content = document.getElementById('infopanelContent');
        var nodeIdEl = document.getElementById('infopanelNodeId');
        var nodeIdText = document.getElementById('infopanelNodeIdText');
        var divider = document.getElementById('infopanelDivider');

        nodeIdText.textContent = node.id;
        nodeIdEl.style.display = 'none'; /* 'block' if we want to show the badge */
        divider.style.display = 'block';

        if (node.info && node.info.trim() !== '') {
            content.innerHTML = node.info;
        } else {
            content.innerHTML = '<div class="infopanel-empty">'
                + '<span class="material-icons-round">info_outline</span>'
                + 'No additional info available for this node.'
                + '</div>';
        }

        if (!infoPanelManuallyHidden) {
            panel.classList.add('open');
            document.getElementById('btnInfoPanel').classList.add('active-toggle');
        }
    }

    function clearInfoPanel() {
        var content = document.getElementById('infopanelContent');
        var nodeIdEl = document.getElementById('infopanelNodeId');
        var divider = document.getElementById('infopanelDivider');

        nodeIdEl.style.display = 'none';
        divider.style.display = 'none';
        content.innerHTML = '<div class="infopanel-empty">'
            + '<span class="material-icons-round">touch_app</span>'
            + 'Select a node to view its details.'
            + '</div>';

        document.getElementById('infopanel').classList.remove('open');
        document.getElementById('btnInfoPanel').classList.remove('active-toggle');
    }

    function toggleInfoPanel() {
        var panel = document.getElementById('infopanel');
        var isOpen = panel.classList.contains('open');
        if (isOpen) {
            panel.classList.remove('open');
            document.getElementById('btnInfoPanel').classList.remove('active-toggle');
            infoPanelManuallyHidden = true;
        } else {
            panel.classList.add('open');
            document.getElementById('btnInfoPanel').classList.add('active-toggle');
            infoPanelManuallyHidden = false;
            if (activeNodeId) showInfoPanel(activeNodeId);
        }
    }

    // ── FOCUS NODE ──
    function focusNode(id) {
        activeNodeId = id;
        network.selectNodes([id]);
        network.focus(id, { scale: 1.5, animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
        document.getElementById('selected-info').textContent = '\u2b24  ' + id;
        buildList(document.getElementById('nodeSearch').value);
        showInfoPanel(id);

        // Scroll sidebar to active node after DOM update
        requestAnimationFrame(function() {
            var el = document.querySelector('.node-item.active');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
    }

    document.getElementById('nodeSearch').addEventListener('input', function() { buildList(this.value); });

    network.on('selectNode', function(params) {
        if (params.nodes.length) {
            activeNodeId = params.nodes[0];
            document.getElementById('selected-info').textContent = '\u2b24  ' + activeNodeId;
            buildList(document.getElementById('nodeSearch').value);
            showInfoPanel(activeNodeId);
            requestAnimationFrame(function() {
                var el = document.querySelector('.node-item.active');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
        }
    });

    network.on('deselectNode', function() {
        activeNodeId = null;
        document.getElementById('selected-info').textContent = '';
        buildList(document.getElementById('nodeSearch').value);
        clearInfoPanel();
        infoPanelManuallyHidden = false;
    });

    // ── TOOLBAR ──
    document.getElementById('toggleSidebar').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    });
    document.getElementById('btnFit').addEventListener('click', function() {
        network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
    });
    document.getElementById('btnZoomIn').addEventListener('click', function() {
        network.moveTo({ scale: network.getScale() * 1.4, animation: { duration: 300 } });
    });
    document.getElementById('btnZoomOut').addEventListener('click', function() {
        network.moveTo({ scale: network.getScale() / 1.4, animation: { duration: 300 } });
    });

    var physicsEnabled = true;
    document.getElementById('btnPhysics').addEventListener('click', function() {
        physicsEnabled = !physicsEnabled;
        network.setOptions({ physics: { enabled: physicsEnabled } });
        var icon = this.querySelector('.material-icons-round');
        icon.textContent = physicsEnabled ? 'pause' : 'play_arrow';
        this.title = physicsEnabled ? 'Pause physics' : 'Resume physics';
        this.classList.toggle('active-toggle', !physicsEnabled);
    });

    document.getElementById('btnInfoPanel').addEventListener('click', toggleInfoPanel);

    document.getElementById('btnDownload').addEventListener('click', function() {
        var a = document.createElement('a');
        a.href = 'source_data.xlsx';
        a.download = 'source_data.xlsx';
        a.click();
    });

    // ── THEME TOGGLE ──
    document.getElementById('btnTheme').addEventListener('click', function() {
        document.body.classList.toggle('light');
        var isLight = document.body.classList.contains('light');
        var icon = this.querySelector('.material-icons-round');
        icon.textContent = isLight ? 'dark_mode' : 'light_mode';
        this.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';

        // Update node colors for the current theme if no template filter is active
        if (!activeTemplateName) {
            var updates = [];
            nodes.get().forEach(function(n) {
                updates.push({
                    id: n.id,
                    color: {
                        background: isLight ? '#5b52e0' : '#6c63ff',
                        border: isLight ? '#7a72f0' : '#8a83ff',
                        highlight: { background: isLight ? '#00a884' : '#00d4aa', border: isLight ? '#00c49a' : '#00f0c0' },
                        hover: { background: isLight ? '#7a72f0' : '#8a83ff', border: isLight ? '#9a92ff' : '#a09aff' }
                    },
                    font: { color: isLight ? '#1a1a2e' : '#cccce0', size: 12 }
                });
            });
            nodes.update(updates);

            // Update stored original colors
            nodes.get().forEach(function(n) {
                originalColors[n.id] = { color: n.color, font: n.font };
            });

            var edgeUpdates = [];
            edges.get().forEach(function(e) {
                edgeUpdates.push({
                    id: e.id,
                    color: {
                        color: isLight ? 'rgba(91,82,224,0.35)' : 'rgba(108,99,255,0.45)',
                        highlight: isLight ? '#00a884' : '#00d4aa',
                        hover: isLight ? 'rgba(91,82,224,0.6)' : 'rgba(108,99,255,0.7)'
                    }
                });
            });
            edges.update(edgeUpdates);
        } else {
            // Re-apply template filter with theme-appropriate colors
            selectTemplate(activeTemplateName);
        }
    });

    // Initial build
    buildList('');
</script>
</body>
</html>
