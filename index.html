<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js" integrity="sha512-LnvoEWDFrqGHlHmDD2101OrLcbsfkrzoSpvtSQtxK3RMnRV0eOkhhBN2dXHKRrUU8p2DGRTk35n4O8nWSVe1mQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" integrity="sha512-WgxfT5LWjfszlPHXRmBWHkV2eceiWTOBvrKCNbdgDYTHrT2AeLCGbF4sZlZw3UMN3WtL0tGUoIAKsu8mllg/XA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface-hover: #24243a;
            --border: rgba(255,255,255,0.06);
            --text: #e4e4ed;
            --text-muted: #8888a4;
            --accent: #6c63ff;
            --accent-glow: rgba(108,99,255,0.35);
            --accent2: #00d4aa;
            --accent2-glow: rgba(0,212,170,0.25);
            --danger: #ff6b8a;
            --sidebar-w: 320px;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ── SIDEBAR ── */
        #sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: transform .3s cubic-bezier(.4,0,.2,1);
        }

        #sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); min-width: 0; width: 0; }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header h2 .material-icons-round { font-size: 18px; }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper .material-icons-round {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color .2s;
        }

        #nodeSearch {
            width: 100%;
            padding: 10px 14px 10px 42px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        #nodeSearch::placeholder { color: var(--text-muted); }
        #nodeSearch:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        #nodeSearch:focus + .material-icons-round { color: var(--accent); }

        .node-count {
            font-size: 11px;
            color: var(--text-muted);
            padding: 10px 20px 6px;
            font-weight: 500;
        }

        #nodeList {
            flex: 1;
            overflow-y: auto;
            padding: 4px 12px 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(108,99,255,0.3) transparent;
        }

        #nodeList::-webkit-scrollbar { width: 5px; }
        #nodeList::-webkit-scrollbar-track { background: transparent; }
        #nodeList::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.3); border-radius: 10px; }

        .node-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            margin-bottom: 2px;
            border-radius: 10px;
            cursor: pointer;
            transition: all .15s ease;
            border: 1px solid transparent;
        }

        .node-item:hover {
            background: var(--surface-hover);
            border-color: var(--border);
        }

        .node-item.active {
            background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(0,212,170,0.08));
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .node-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            flex-shrink: 0;
            transition: transform .2s;
        }

        .node-item:hover .node-dot { transform: scale(1.4); }
        .node-item.active .node-dot { background: var(--accent2); box-shadow: 0 0 10px var(--accent2-glow); }

        .node-label {
            font-size: 12.5px;
            font-weight: 400;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .node-item.active .node-label { font-weight: 600; color: #fff; }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 13px;
        }
        .no-results .material-icons-round { font-size: 36px; margin-bottom: 10px; display: block; opacity: .4; }

        /* ── MAIN AREA ── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }

        #toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .tool-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
            transition: all .15s;
            font-size: 20px;
        }
        .tool-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(108,99,255,0.08); }

        #selected-info {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-muted);
            max-width: 50%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #mynetwork {
            flex: 1;
            background:
                radial-gradient(circle at 20% 30%, rgba(108,99,255,0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,212,170,0.04) 0%, transparent 50%),
                var(--bg);
            background-size: cover;
        }

        /* ── LOADING OVERLAY ── */
        #loadingBar {
            position: absolute;
            inset: 0;
            background: rgba(15,15,19,0.92);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity .5s ease;
        }

        .loader-content { text-align: center; }
        .loader-content .label { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }

        .progress-track {
            width: 320px;
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #bar {
            height: 100%;
            width: 0;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            box-shadow: 0 0 16px var(--accent-glow);
            transition: width .3s ease;
        }

        #text { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

        /* ── TOGGLE BTN (visible when sidebar collapsed) ── */
        #sidebarToggle.floating {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 20;
        }

        /* ── TOOLTIP ── */
        .vis-tooltip {
            background: var(--surface) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            padding: 8px 12px !important;
            font-family: 'Inter', sans-serif !important;
            font-size: 12px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
    <div class="sidebar-header">
        <h2><span class="material-icons-round">hub</span> Archetype Inclusion Patterns</h2>
        <div class="search-wrapper">
            <input type="text" id="nodeSearch" placeholder="Search nodes…" autocomplete="off" spellcheck="false">
            <span class="material-icons-round">search</span>
        </div>
    </div>
    <div class="node-count" id="nodeCount"></div>
    <div id="nodeList"></div>
</div>

<!-- MAIN -->
<div id="main">
<div id="toolbar">
    <button class="tool-btn" id="toggleSidebar" title="Toggle sidebar"><span class="material-icons-round">menu</span></button>
    <button class="tool-btn" id="btnFit" title="Fit all"><span class="material-icons-round">fit_screen</span></button>
    <button class="tool-btn" id="btnZoomIn" title="Zoom in"><span class="material-icons-round">add</span></button>
    <button class="tool-btn" id="btnZoomOut" title="Zoom out"><span class="material-icons-round">remove</span></button>
    <button class="tool-btn" id="btnPhysics" title="Pause physics"><span class="material-icons-round">pause</span></button>
    <span id="selected-info"></span>
</div>
    <div id="mynetwork"></div>
    <div id="loadingBar">
        <div class="loader-content">
            <div class="label">Stabilizing layout…</div>
            <div class="progress-track"><div id="bar"></div></div>
            <div id="text">0 %</div>
        </div>
    </div>
</div>

<script src="dataset.js"></script>

<script>
    // ── DATA ──
  /*  var nodes = new vis.DataSet([
        { id: "openEHR-EHR-ACTION.medication.v1",  label: "openEHR-EHR-ACTION.medication.v1",  shape: "dot", size: 18, color: { background: "#6c63ff", border: "#8a83ff", highlight: { background: "#00d4aa", border: "#00f0c0" }, hover: { background: "#8a83ff", border: "#a09aff" } }, font: { color: "#cccce0", size: 12 } },
        { id: "openEHR-EHR-CLUSTER.dosage.v1",     label: "openEHR-EHR-CLUSTER.dosage.v1",     shape: "dot", size: 18, color: { background: "#6c63ff", border: "#8a83ff", highlight: { background: "#00d4aa", border: "#00f0c0" }, hover: { background: "#8a83ff", border: "#a09aff" } }, font: { color: "#cccce0", size: 12 } }
    ]); 
    

    var edges = new vis.DataSet([
        { from: "openEHR-EHR-ACTION.medication.v1", to: "openEHR-EHR-CLUSTER.dosage.v1", arrows: "to", width: 20, color: { color: "rgba(108,99,255,0.45)", highlight: "#00d4aa", hover: "rgba(108,99,255,0.7)" }, smooth: { type: "curvedCW", roundness: 0.15 } }
    ]);
    */

    // ── NETWORK ──
    var container = document.getElementById('mynetwork');
    var data = { nodes: nodes, edges: edges };
    var options = {
        configure: {
            enabled: false
        },
        edges: {
            smooth: {
                enabled: true,
                type: "dynamic"
            }
        },
        interaction: {
            dragNodes: true,
            hover: true,
            tooltipDelay: 150,
            zoomView: true,
            dragView: true
        },
        physics: {
            enabled: true,
            solver: "forceAtlas2Based",
            forceAtlas2Based: {
                gravitationalConstant: -60,
                centralGravity: 0.008,
                springLength: 160,
                springConstant: 0.06,
                avoidOverlap: 0.6
            },
            stabilization: {
                enabled: true,
                iterations: 1000,
                updateInterval: 50,
                fit: true
            }
        }
    };

  options = {
        configure: {
            enabled: false
        },
        edges: {
            smooth: {
                enabled: true,
                type: "dynamic"
            }
        },
        interaction: {
            dragNodes: true,
            hover: true,
            tooltipDelay: 150,
            zoomView: true,
            dragView: true
        },
        physics: {
            enabled: true,
            solver: "forceAtlas2Based",
            forceAtlas2Based: {
                gravitationalConstant: -60,
                centralGravity: 0.005,
                springLength: 260,
                springConstant: 0.06,
                avoidOverlap: 0.6
            },
            stabilization: {
                enabled: true,
                iterations: 500,
                updateInterval: 50,
                fit: true
            }
        }
    };

    var network = new vis.Network(container, data, options);

    // ── LOADING BAR ──
    network.on("stabilizationProgress", function(p) {
        var pct = Math.round((p.iterations / p.total) * 100);
        document.getElementById('bar').style.width = pct + '%';
        document.getElementById('text').innerHTML = pct + ' %';
    });
    network.once("stabilizationIterationsDone", function() {
        document.getElementById('bar').style.width = '100%';
        document.getElementById('text').innerHTML = '100 %';
        var lb = document.getElementById('loadingBar');
        lb.style.opacity = 0;
        setTimeout(function() { lb.style.display = 'none'; }, 500);
    });

    // ── SIDEBAR LIST ──
    var activeNodeId = null;

    function buildList(filter) {
        var list = document.getElementById('nodeList');
        var allNodes = nodes.get();
        var filtered = allNodes;
        if (filter) {
            var q = filter.toLowerCase();
            filtered = allNodes.filter(function(n) { return n.label.toLowerCase().indexOf(q) !== -1; });
        }
        document.getElementById('nodeCount').textContent = filtered.length + ' of ' + allNodes.length + ' nodes';

        if (filtered.length === 0) {
            list.innerHTML = '<div class="no-results"><span class="material-icons-round">search_off</span>No nodes match your search.</div>';
            return;
        }

        filtered.sort(function(a, b) { return a.label.localeCompare(b.label); });

        var html = '';
        filtered.forEach(function(n) {
            var active = n.id === activeNodeId ? ' active' : '';
            html += '<div class="node-item' + active + '" data-id="' + n.id + '">'
                  + '<span class="node-dot"></span>'
                  + '<span class="node-label" title="' + n.label + '">' + highlightMatch(n.label, filter) + '</span>'
                  + '</div>';
        });
        list.innerHTML = html;

        list.querySelectorAll('.node-item').forEach(function(el) {
            el.addEventListener('click', function() {
                var id = this.getAttribute('data-id');
                focusNode(id);
            });
        });
    }

    function highlightMatch(text, query) {
        if (!query) return text;
        var idx = text.toLowerCase().indexOf(query.toLowerCase());
        if (idx === -1) return text;
        return text.substring(0, idx) + '<strong style="color:#00d4aa">' + text.substring(idx, idx + query.length) + '</strong>' + text.substring(idx + query.length);
    }

    function focusNode(id) {
        activeNodeId = id;
        network.selectNodes([id]);
        network.focus(id, { scale: 1.5, animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
        document.getElementById('selected-info').textContent = '⬤  ' + id;
        buildList(document.getElementById('nodeSearch').value);
    }

    // Search input
    document.getElementById('nodeSearch').addEventListener('input', function() {
        buildList(this.value);
    });

    // Sync: clicking a node in the network highlights in sidebar
    network.on('selectNode', function(params) {
        if (params.nodes.length) {
            activeNodeId = params.nodes[0];
            document.getElementById('selected-info').textContent = '⬤  ' + activeNodeId;
            buildList(document.getElementById('nodeSearch').value);
            // scroll into view
            var el = document.querySelector('.node-item.active');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    });

    network.on('deselectNode', function() {
        activeNodeId = null;
        document.getElementById('selected-info').textContent = '';
        buildList(document.getElementById('nodeSearch').value);
    });

    // ── TOOLBAR ──
    document.getElementById('toggleSidebar').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    });
    document.getElementById('btnFit').addEventListener('click', function() {
        network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
    });
    document.getElementById('btnZoomIn').addEventListener('click', function() {
        network.moveTo({ scale: network.getScale() * 1.4, animation: { duration: 300 } });
    });
    document.getElementById('btnZoomOut').addEventListener('click', function() {
        network.moveTo({ scale: network.getScale() / 1.4, animation: { duration: 300 } });
    });

    var physicsEnabled = true;
document.getElementById('btnPhysics').addEventListener('click', function() {
    physicsEnabled = !physicsEnabled;
    network.setOptions({ physics: { enabled: physicsEnabled } });
    var icon = this.querySelector('.material-icons-round');
    icon.textContent = physicsEnabled ? 'pause' : 'play_arrow';
    this.title = physicsEnabled ? 'Pause physics' : 'Resume physics';
});

    // Initial build
    buildList('');
</script>

</body>
</html>
